name: Continuous Integration

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/ti-ticket?schema=public"

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test -- --passWithNoTests

      - name: Build project
        run: npm run build
        env:
          # Variável necessária para o Next.js validar as queries do Prisma no build
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/ti-ticket?schema=public"
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}